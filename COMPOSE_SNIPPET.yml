# Add this service to /workspace/opt/home/compose.yml
# (paste under the "Kiosk/UI Containers" section, alongside homeassistant)

  familyhub:
    build: ./familyhub
    restart: unless-stopped
    ports:
      - '3030:3000'
    environment:
      - TZ=America/Denver
      - FAMILY_PASSWORD=${FAMILY_PASSWORD:?set in .env}
      - DATABASE_URL=/data/familyhub.db
      # Optional iCloud CalDAV (app-specific password from appleid.apple.com → Sign-In and Security)
      # - ICLOUD_USERNAME=you@icloud.com
      # - ICLOUD_APP_PASSWORD=xxxx-xxxx-xxxx-xxxx
    volumes:
      - ./familyhub/data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/login >/dev/null || exit 1']
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3
