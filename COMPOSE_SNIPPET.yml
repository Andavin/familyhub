# Drop this service block into your existing docker-compose.yml.

  familyhub:
    build: ./familyhub
    restart: unless-stopped
    ports:
      - '3030:3000'
    environment:
      # Container timezone. Override in your .env, e.g. TZ=Europe/London.
      # Falls back to UTC if unset (linuxserver.io convention).
      - TZ=${TZ:-UTC}
      - FAMILY_PASSWORD=${FAMILY_PASSWORD:?set in .env}
      - DATABASE_URL=/data/familyhub.db
    volumes:
      - ./familyhub/data:/data
      # Alternative to TZ env var — inherit the host's clock instead.
      # - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/login >/dev/null || exit 1']
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3
