<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#fef7f0" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Family Hub" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<script>
			// Apply persisted theme before paint to avoid a flash of light UI on
			// dark-mode users. Mirrors the logic in src/lib/theme.svelte.ts.
			(function () {
				try {
					var t = localStorage.getItem('fh_theme');
					if (t === 'dark' || t === 'light') {
						document.documentElement.dataset.theme = t;
						var meta = document.querySelector('meta[name="theme-color"]');
						if (meta) meta.setAttribute('content', t === 'dark' ? '#000000' : '#fef7f0');
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
